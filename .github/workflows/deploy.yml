name: CI / Deploy

on:
  push:
    branches:
      - master

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run basic lint/test smoke check
        run: |
          python -m py_compile app.py agents.py pipeline.py tools.py

      - name: Build Docker image
        run: |
          docker build -t research-ai:latest .

      - name: Push deployment info
        run: echo "Deployment step completed; use your cloud provider to deploy the generated Docker image."
